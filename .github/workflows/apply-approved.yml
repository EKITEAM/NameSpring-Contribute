name: Apply Approved Contributions

on:
  pull_request:
    types: [labeled]
    branches: [main]

jobs:
  apply:
    if: ${{ github.event.label.name == 'approved' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get changed JSON files in pending
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: data/contributions/pending/*.json

      - name: Apply contributions
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          bash scripts/apply-pending-files.sh ${{ steps.changed-files.outputs.all_changed_files }}
